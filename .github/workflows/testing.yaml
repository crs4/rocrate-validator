name: 🧪 CI Pipeline 1 -- Testing

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
    push:
        branches:
            - "**"
        tags:
            - "*.*.*"
        paths:
            - "**"
            - "!docs/**"
            - "!examples/**"
    pull_request:
        paths:
            - "**"
            - "!docs/**"
            - "!examples/**"

env:
    TERM: xterm
    VENV_PATH: .venv
    PYTHON_VERSION: "3.11"
    FORCE_COLOR: "1"  # Force color output in CI

jobs:
    # Verifies code style, bugs, complexity, and spelling via **ruff** + **typos**
    lint:
        name: 🚨 Lint and spellcheck
        runs-on: ubuntu-latest
        steps:
            # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
            - name: ⬇️ Checkout code
              uses: actions/checkout@v6
            - name: 🐍 Set up Python v${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
            - name: 🔽 Install ruff (version from pyproject.toml)
              run: |
                # Read the ruff version constraint from pyproject.toml.
                # Poetry uses caret syntax (e.g. "^0.15.15") which means
                # "compatible with 0.15.x".  pip uses PEP 440 "~=" for the
                # same semantics on pre-1.0 packages.
                pip install "$(
                  python -c "
                import tomllib
                cfg = tomllib.loads(open('pyproject.toml').read())
                constraint = cfg['tool']['poetry']['group']['dev']['dependencies']['ruff']
                # Drop the caret prefix so we can pass ~= to pip
                version = constraint.lstrip('^')
                print(f'ruff~={version}')
                ")"
            - name: ⌛ Lint Python code with ruff
              run: |
                # Produce GitHub annotations; suppress exit code so the
                # statistics summary still runs.
                ruff check rocrate_validator tests --output-format github || true
                # Emit a compact rule-count summary and fail the job if needed.
                ruff check rocrate_validator tests --statistics
            - name: ⌛ Spell check code and profiles (covers Python and SHACL)
              uses: crate-ci/typos@v1.47.0

    # Runs the tests
    test:
        name: ⌛ Run tests
        runs-on: ubuntu-latest
        needs: [lint]
        steps:
            - name: ⬇️ Checkout
              uses: actions/checkout@v6
            - name: 🐍 Set up Python v${{ env.PYTHON_VERSION }}
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ env.PYTHON_VERSION }}
            - name: 🔄 Upgrade pip
              run: pip install --upgrade pip
            - name: 🐍 Initialise a virtual env
              run: python -m venv ${VENV_PATH}
            - name: 🐍 Enable virtual env
              run: source ${VENV_PATH}/bin/activate
            - name: 🔽 Install Poetry
              run: pip install poetry
            - name: 🔽 Install dependencies
              run: poetry install --no-interaction --no-ansi
            - name: ⌛ Run tests
              run: poetry run pytest
              env:
                TERM: "dumb"
                LINES: "50"
                COLUMNS: "120"
